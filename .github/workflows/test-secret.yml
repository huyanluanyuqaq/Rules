name: Test Secret Configuration

on:
  workflow_dispatch:  # 手动触发

jobs:
  test-secret:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
        
    - name: Test secret availability
      run: |
        echo "Testing secret configuration..."
        # 使用更安全的方式来测试secret
        if [ "${{ secrets.GH_TOKEN }}" != "" ]; then
          echo "✅ Secret is configured correctly"
          # 只显示token长度，不显示具体内容
          TOKEN_LENGTH=$(echo "${{ secrets.GH_TOKEN }}" | wc -c)
          echo "Token length: $TOKEN_LENGTH characters"
        else
          echo "❌ Secret is not configured properly"
          exit 1
        fi
        
    - name: Test git operations
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        echo "Test timestamp: $(date)" > test-secret.txt
        git add test-secret.txt
        git commit -m "Test commit to verify secret works" || echo "No changes to commit"
        git push origin main || echo "Push failed - check permissions"