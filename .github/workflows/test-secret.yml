name: Test Secret Configuration

on:
  workflow_dispatch:  # 手动触发

jobs:
  test-secret:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
        
    - name: Test secret availability
      run: |
        echo "Testing secret configuration..."
        if [ -n "${{ secrets.GH_TOKEN }}" ]; then
          echo "✅ Secret is configured correctly"
          echo "Token length: ${#{{ secrets.GH_TOKEN }}}"  # 显示token长度但不显示内容
        else
          echo "❌ Secret is not configured"
          exit 1
        fi
        
    - name: Test git operations
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        echo "Test timestamp: $(date)" > test-secret.txt
        git add test-secret.txt
        git commit -m "Test commit to verify secret works" || echo "No changes to commit"
        git push origin main || echo "Push failed - check permissions"