name: Enable All Workflows Direct API

on:
  workflow_dispatch:  # 手动触发

jobs:
  enable-workflows:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Get and Enable All Workflows
      run: |
        # 获取所有工作流
        echo "获取工作流列表..."
        workflows=$(curl -s -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows)
        
        # 解析工作流ID
        workflow_ids=$(echo "$workflows" | jq -r '.workflows[].id')
        
        echo "找到以下工作流ID:"
        echo "$workflow_ids"
        echo ""
        
        # 逐个启用工作流
        success_count=0
        fail_count=0
        
        for workflow_id in $workflow_ids; do
          echo "正在启用工作流 ID: $workflow_id"
          
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/$workflow_id/enable)
          
          if [ "$response" = "204" ]; then
            echo "✅ 工作流 $workflow_id 启用成功"
            ((success_count++))
          else
            echo "❌ 工作流 $workflow_id 启用失败 (HTTP $response)"
            ((fail_count++))
          fi
          
          # 避免API速率限制
          sleep 1
        done
        
        echo ""
        echo "=== 启用完成 ==="
        echo "成功: $success_count"
        echo "失败: $fail_count"
        
        if [ $fail_count -eq 0 ]; then
          echo "🎉 所有工作流均已成功启用！"
        else
          echo "⚠️  部分工作流启用失败，请检查日志"
        fi